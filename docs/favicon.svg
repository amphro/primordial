<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#080c14"/>
  <!-- Blue cells (left side) -->
  <rect x="2"  y="2"  width="6" height="6" rx="1" fill="#4a9eff"/>
  <rect x="2"  y="10" width="6" height="6" rx="1" fill="#4a9eff" opacity="0.6"/>
  <rect x="10" y="2"  width="6" height="6" rx="1" fill="#4a9eff" opacity="0.8"/>
  <rect x="10" y="10" width="6" height="6" rx="1" fill="#4a9eff"/>
  <rect x="2"  y="18" width="6" height="6" rx="1" fill="#4a9eff" opacity="0.4"/>
  <!-- Red cells (right side) -->
  <rect x="18" y="2"  width="6" height="6" rx="1" fill="#ff6b4a"/>
  <rect x="26" y="2"  width="4" height="6" rx="1" fill="#ff6b4a" opacity="0.7"/>
  <rect x="18" y="10" width="6" height="6" rx="1" fill="#ff6b4a" opacity="0.8"/>
  <rect x="26" y="10" width="4" height="6" rx="1" fill="#ff6b4a"/>
  <rect x="18" y="18" width="6" height="6" rx="1" fill="#ff6b4a" opacity="0.5"/>
  <rect x="26" y="18" width="4" height="6" rx="1" fill="#ff6b4a" opacity="0.9"/>
  <!-- Nutrient dot (center battle zone) -->
  <circle cx="16" cy="16" r="2" fill="#c8a840" opacity="0.9"/>
  <!-- Power nutrient diamond -->
  <polygon points="16,24 18,28 16,32 14,28" fill="#c080ff" opacity="0.85"/>
