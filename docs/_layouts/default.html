<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% include head-custom.html %}
    <title>{{ page.title | default: site.title }}</title>
  </head>
  <body>
    <header class="page-header" role="banner">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      {% if site.play_url %}
        <a href="{{ site.play_url }}" class="btn btn-primary">Play →</a>
      {% endif %}
      <a href="https://github.com/amphro/primordial" class="btn">View on GitHub</a>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <nav class="site-footer-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        · <a href="{{ '/how-to-play/' | relative_url }}">How to Play</a>
        · <a href="{{ '/design/' | relative_url }}">Design</a>
        · <a href="{{ '/terms/' | relative_url }}">Terms</a>
        · <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
      </nav>
    </footer>
  </body>
</html>
